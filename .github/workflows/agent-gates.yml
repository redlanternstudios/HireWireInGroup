name: Agent Gates

on:
  push:
    branches:
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  agent-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Agent protected-file gate
        run: npm run agent:protected

      - name: Agent preflight gate
        run: npm run agent:preflight

      - name: Agent dead UI gate
        run: npm run agent:dead-ui

      - name: Agent receipt gate
        run: npm run agent:receipts

      - name: Typecheck, lint, and build
        run: npm run agent:verify

      - name: Upload receipt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hirewire-agent-receipts-${{ github.run_id }}-${{ github.run_attempt }}
          path: .agent/receipts
          if-no-files-found: warn
