name: Agent Gates

on:
  pull_request:
  workflow_dispatch:

jobs:
  agent-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Agent protected-file gate
        run: npm run agent:protected

      - name: Agent preflight gate
        run: npm run agent:preflight

      - name: Agent dead UI gate
        run: npm run agent:dead-ui

      - name: Typecheck, lint, and build
        run: npm run agent:verify
